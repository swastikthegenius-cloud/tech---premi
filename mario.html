<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Sprint | Tech Premi Lab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page tool-page">
    <header class="tool-header">
      <a class="home-brand logo-brand" href="index.html"><img class="site-logo" src="logo.svg" alt="Tech Premi Tools logo"></a>
      <a class="nav-back" href="index.html">home</a>
    </header>

    <main class="panel red-panel">
      <div class="tool-topline">
        <p>unlock maps and runners by pushing your best score higher</p>
      </div>
      <div class="score-board">
        <div><span>score</span><strong id="mario-score">0</strong></div>
        <div><span>best</span><strong id="mario-best">0</strong></div>
        <div><span>coins</span><strong id="mario-coins">0</strong></div><div><span>lives</span><strong id="mario-lives">1</strong></div>
      </div>

      <section class="unlock-board">
        <div class="unlock-box">
          <div class="unlock-head">
            <p class="leaderboard-kicker">Maps</p>
            <h2>Choose Map</h2>
          </div>
          <select class="field-input" id="mario-map-grid" aria-label="Choose map"></select>
        </div>
        <div class="unlock-box">
          <div class="unlock-head">
            <p class="leaderboard-kicker">Characters</p>
            <h2>Choose Runner</h2>
          </div>
          <select class="field-input" id="mario-character-grid" aria-label="Choose runner"></select>
        </div>
      </section>

      <section class="unlock-box mario-detail-card">
        <p class="leaderboard-kicker" id="mario-detail-kicker">Runner Story</p>
        <h2 id="mario-detail-title">Sprout</h2>
        <p id="mario-detail-look"></p>
        <p id="mario-detail-story"></p>
        <p id="mario-detail-power"></p>
      </section>

      <canvas class="game-canvas mario-canvas" id="mario-canvas" width="800" height="320"></canvas>
      <div class="mario-controls" aria-label="Platform Sprint touch controls">
        <button class="action-button secondary-button" id="mario-left" type="button">left</button>
        <button class="action-button" id="mario-jump" type="button">jump</button>
        <button class="action-button secondary-button" id="mario-right" type="button">right</button>
      </div>
      <div class="game-note" id="mario-message">press start to begin your run</div>
      <button class="action-button" id="mario-start" type="button">start runner</button>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
